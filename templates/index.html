<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAgent — AI Content Generator & Reviewer</title>
    <meta name="description" content="Generate and review educational content using AI agents with automatic quality refinement.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --border-glow: #3a3a5a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #7c5cfc;
            --accent-soft: #7c5cfc22;
            --green: #34d399;
            --green-soft: #34d39922;
            --red: #f87171;
            --red-soft: #f8717122;
            --amber: #fbbf24;
            --amber-soft: #fbbf2422;
            --radius: 14px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Header ──────────────────────────────── */
        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c5cfc, #a78bfa, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-dim);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* ── Layout ──────────────────────────────── */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ── Input Card ──────────────────────────── */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 2.5rem;
        }

        .input-card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 140px 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input, .field select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .field input::placeholder {
            color: var(--text-dim);
        }

        button#run-btn {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #7c5cfc, #6d4de8);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        button#run-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px #7c5cfc44;
        }

        button#run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Pipeline Flow ───────────────────────── */
        .pipeline {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Connector arrow between stages */
        .connector {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            opacity: 0;
            transform: scaleY(0);
            transition: opacity 0.4s, transform 0.4s;
        }

        .connector.visible {
            opacity: 1;
            transform: scaleY(1);
        }

        .connector svg {
            width: 24px;
            height: 24px;
            color: var(--accent);
            animation: pulse-arrow 2s ease-in-out infinite;
        }

        @keyframes pulse-arrow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ── Stage Card ──────────────────────────── */
        .stage {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s;
        }

        .stage.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stage-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .stage-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .stage-icon.generator { background: var(--accent-soft); color: var(--accent); }
        .stage-icon.reviewer { background: var(--amber-soft); color: var(--amber); }
        .stage-icon.refined { background: var(--green-soft); color: var(--green); }

        .stage-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .stage-badge {
            margin-left: auto;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-pass { background: var(--green-soft); color: var(--green); }
        .badge-fail { background: var(--red-soft); color: var(--red); }

        .stage-body {
            padding: 1.5rem;
        }

        /* ── Content Styles ──────────────────────── */
        .explanation {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            border-left: 3px solid var(--accent);
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .mcq-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mcq {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .mcq-question {
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .mcq-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .mcq-option {
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.88rem;
            color: var(--text-dim);
            background: var(--bg);
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .mcq-option.correct {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-soft);
        }

        .mcq-answer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--green);
            font-weight: 600;
        }

        /* Feedback list */
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .feedback-item {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.75rem 1rem;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .feedback-item::before {
            content: '⚠';
            flex-shrink: 0;
        }

        .feedback-pass .feedback-item::before {
            content: '✓';
        }

        /* ── Loading ─────────────────────────────── */
        .loader-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 4rem 1rem;
        }

        .loader-wrap.active { display: flex; }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            color: var(--text-dim);
            font-size: 0.95rem;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Error ───────────────────────────────── */
        .error-box {
            display: none;
            background: var(--red-soft);
            border: 1px solid var(--red);
            border-radius: var(--radius-sm);
            padding: 1rem 1.25rem;
            color: var(--red);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .error-box.visible { display: block; }

        /* ── Responsive ──────────────────────────── */
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .mcq-options {
                grid-template-columns: 1fr;
            }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>EduAgent</h1>
        <p>AI-powered educational content generation with automated review</p>
    </header>

    <div class="container">
        <!-- Input -->
        <div class="input-card">
            <h2>Configure</h2>
            <div class="form-row">
                <div class="field">
                    <label for="grade-select">Grade</label>
                    <select id="grade-select">
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4" selected>Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                        <option value="11">Grade 11</option>
                        <option value="12">Grade 12</option>
                    </select>
                </div>
                <div class="field">
                    <label for="topic-input">Topic</label>
                    <input type="text" id="topic-input" placeholder="e.g. Types of angles" value="Types of angles">
                </div>
                <button id="run-btn">Generate</button>
            </div>
        </div>

        <!-- Error -->
        <div id="error-box" class="error-box"></div>

        <!-- Loader -->
        <div id="loader" class="loader-wrap">
            <div class="loader"></div>
            <span class="loader-text">Running agent pipeline…</span>
        </div>

        <!-- Pipeline Output -->
        <div id="pipeline" class="pipeline" style="display:none;">

            <!-- Stage 1: Generator -->
            <div id="stage-gen" class="stage">
                <div class="stage-header">
                    <div class="stage-icon generator">⚡</div>
                    <span class="stage-title">Generator Agent</span>
                    <span class="stage-badge" style="background:var(--accent-soft);color:var(--accent);">Step 1</span>
                </div>
                <div class="stage-body" id="gen-body"></div>
            </div>

            <div id="conn-1" class="connector">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            </div>

            <!-- Stage 2: Reviewer -->
            <div id="stage-rev" class="stage">
                <div class="stage-header">
                    <div class="stage-icon reviewer">🔍</div>
                    <span class="stage-title">Reviewer Agent</span>
                    <span id="rev-badge" class="stage-badge">Step 2</span>
                </div>
                <div class="stage-body" id="rev-body"></div>
            </div>

            <div id="conn-2" class="connector">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            </div>

            <!-- Stage 3: Refined (conditional) -->
            <div id="stage-ref" class="stage">
                <div class="stage-header">
                    <div class="stage-icon refined">✨</div>
                    <span class="stage-title">Refined Output</span>
                    <span id="ref-badge" class="stage-badge" style="background:var(--green-soft);color:var(--green);">Refinement</span>
                </div>
                <div class="stage-body" id="ref-body"></div>
            </div>
        </div>
    </div>

    <script>
        const runBtn = document.getElementById('run-btn');
        const gradeSelect = document.getElementById('grade-select');
        const topicInput = document.getElementById('topic-input');
        const loader = document.getElementById('loader');
        const pipeline = document.getElementById('pipeline');
        const errorBox = document.getElementById('error-box');

        runBtn.addEventListener('click', async () => {
            const grade = parseInt(gradeSelect.value);
            const topic = topicInput.value.trim();
            if (!topic) { topicInput.focus(); return; }

            // Reset UI
            errorBox.classList.remove('visible');
            errorBox.textContent = '';
            pipeline.style.display = 'none';
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('visible'));
            document.querySelectorAll('.connector').forEach(c => c.classList.remove('visible'));
            loader.classList.add('active');
            runBtn.disabled = true;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grade, topic })
                });
                const json = await res.json();

                if (!json.success) throw new Error(json.error || 'Unknown error');

                const data = json.data;
                loader.classList.remove('active');
                pipeline.style.display = 'flex';

                // Animate Stage 1: Generator
                renderContent('gen-body', data.generated);
                await reveal('stage-gen', 0);

                // Animate Connector 1
                await revealConnector('conn-1', 300);

                // Animate Stage 2: Reviewer
                renderReview('rev-body', data.review);
                const revBadge = document.getElementById('rev-badge');
                if (data.review.status === 'pass') {
                    revBadge.className = 'stage-badge badge-pass';
                    revBadge.textContent = '✓ Pass';
                } else {
                    revBadge.className = 'stage-badge badge-fail';
                    revBadge.textContent = '✗ Fail';
                }
                await reveal('stage-rev', 300);

                // Stage 3: Refined (only if refinement happened)
                if (data.refined) {
                    await revealConnector('conn-2', 300);
                    renderContent('ref-body', data.refined);

                    // Show refined review status if available
                    const refBadge = document.getElementById('ref-badge');
                    if (data.refined_review) {
                        if (data.refined_review.status === 'pass') {
                            refBadge.className = 'stage-badge badge-pass';
                            refBadge.textContent = '✓ Pass';
                        } else {
                            refBadge.className = 'stage-badge badge-fail';
                            refBadge.textContent = '✗ Still Needs Work';
                        }
                    }

                    await reveal('stage-ref', 300);
                } else {
                    document.getElementById('conn-2').classList.remove('visible');
                    document.getElementById('stage-ref').classList.remove('visible');
                }

            } catch (err) {
                loader.classList.remove('active');
                errorBox.textContent = err.message;
                errorBox.classList.add('visible');
            } finally {
                runBtn.disabled = false;
            }
        });

        /* ── Helpers ──────────────────────────────── */

        function reveal(id, delay) {
            return new Promise(resolve => {
                setTimeout(() => {
                    document.getElementById(id).classList.add('visible');
                    resolve();
                }, delay);
            });
        }

        function revealConnector(id, delay) {
            return new Promise(resolve => {
                setTimeout(() => {
                    document.getElementById(id).classList.add('visible');
                    resolve();
                }, delay);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderContent(containerId, content) {
            const el = document.getElementById(containerId);
            let html = `<div class="explanation">${escapeHtml(content.explanation)}</div>`;
            html += '<div class="mcq-list">';
            content.mcqs.forEach((mcq, i) => {
                html += `<div class="mcq">`;
                html += `<div class="mcq-question">Q${i + 1}. ${escapeHtml(mcq.question)}</div>`;
                html += `<div class="mcq-options">`;
                mcq.options.forEach(opt => {
                    const isCorrect = opt.startsWith(mcq.answer);
                    html += `<div class="mcq-option${isCorrect ? ' correct' : ''}">${escapeHtml(opt)}</div>`;
                });
                html += `</div>`;
                html += `<div class="mcq-answer">Answer: ${escapeHtml(mcq.answer)}</div>`;
                html += `</div>`;
            });
            html += '</div>';
            el.innerHTML = html;
        }

        function renderReview(containerId, review) {
            const el = document.getElementById(containerId);
            const cssClass = review.status === 'pass' ? 'feedback-pass' : '';
            let html = `<div class="feedback-list ${cssClass}">`;
            if (review.feedback && review.feedback.length > 0) {
                review.feedback.forEach(fb => {
                    html += `<div class="feedback-item">${escapeHtml(fb)}</div>`;
                });
            } else {
                html += `<div class="feedback-item">No issues found — content looks great!</div>`;
            }
            html += '</div>';
            el.innerHTML = html;
        }
    </script>
</body>
</html>
